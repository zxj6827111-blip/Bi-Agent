# ============================================================
# Bi-Agent NAS 部署 — 飞牛 Docker Compose 配置
# ============================================================
# 用法：
#   1. 将此文件重命名为 docker-compose.yml
#   2. 复制 .env.nas 为 .env 并填写你的配置
#   3. docker compose up -d --build
# ============================================================

services:
  # ---- 纸面交易监控（主服务，24h 持续运行）----
  bi-agent-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bi-agent-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      START_MODE: monitor
      # 持续运行；脚本在 Asia/Shanghai 每日 00:00 自动归档 Session
      FORMAL_MONITOR_DURATION_SECONDS: 0
      FORMAL_MONITOR_TIMEZONE: Asia/Shanghai
      FORMAL_MONITOR_OUTPUT_DIR: /app/data/formal-signal-monitor
      FORMAL_MONITOR_FILE_LOG_ENABLED: "true"
      FORMAL_MONITOR_LOG_DIR: /app/data/logs/formal-monitor
      FORMAL_MONITOR_LOG_MAX_BYTES: "10485760"
      FORMAL_MONITOR_LOG_MAX_ARCHIVES: "14"
    volumes:
      # 持久化数据目录 → NAS 共享文件夹
      - ./data:/app/data
    # 监控不需要暴露 Web 端口，如需 Web UI 可取消注释
    # ports:
    #   - "4173:4173"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    # 同时检查真实监控进程和 runtime checkpoint 新鲜度，避免 pgrep 匹配自身。
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pgrep -f '[f]ormalSignalPaperMonitor.js' >/dev/null &&
          node -e "const fs=require('fs');const p='/app/data/formal-signal-monitor/runtime.json';if(!fs.existsSync(p)||Date.now()-fs.statSync(p).mtimeMs>600000)process.exit(1)"
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 2m

  # ---- Futures 急拉雷达：连续 WebSocket 发现，严格 paper-only ----
  bi-agent-radar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bi-agent-radar
    restart: unless-stopped
    env_file:
      - .env
    environment:
      START_MODE: radar
      PUMP_RADAR_DURATION_SECONDS: 0
      PUMP_RADAR_OUTPUT_DIR: /app/data/pump-radar
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pgrep -f '[p]umpRadarMonitor.js' >/dev/null &&
          node -e "const fs=require('fs');const p='/app/data/pump-radar/runtime.json';if(!fs.existsSync(p)||Date.now()-fs.statSync(p).mtimeMs>90000)process.exit(1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ---- Web UI（用于查看实时状态，含 Monitor 和 Radar 状态接口）----
  bi-agent-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bi-agent-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      START_MODE: server
      FORMAL_MONITOR_OUTPUT_DIR: /app/data/formal-signal-monitor
    ports:
      - "4173:4173"
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
