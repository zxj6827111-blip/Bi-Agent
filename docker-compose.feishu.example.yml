services:
  bi-agent:
    build: .
    container_name: bi-agent
    restart: unless-stopped
    ports:
      - "4173:4173"
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      BINANCE_SPOT_BASE_URL: ${BINANCE_SPOT_BASE_URL:-https://data-api.binance.vision}
      BINANCE_FUTURES_BASE_URL: ${BINANCE_FUTURES_BASE_URL:-https://fapi.binance.com}
      BINANCE_SPOT_BASE_URLS: ${BINANCE_SPOT_BASE_URLS:-https://data-api.binance.vision}
      BINANCE_FUTURES_BASE_URLS: ${BINANCE_FUTURES_BASE_URLS:-https://fapi.binance.com}
      BINANCE_REQUEST_TIMEOUT_MS: ${BINANCE_REQUEST_TIMEOUT_MS:-8000}
      MARKET_WATCH_MAX_SYMBOLS: ${MARKET_WATCH_MAX_SYMBOLS:-80}
      MARKET_WATCH_SIGNAL_LIMIT: ${MARKET_WATCH_SIGNAL_LIMIT:-30}
      MARKET_WATCH_AI_REVIEW_LIMIT: ${MARKET_WATCH_AI_REVIEW_LIMIT:-3}
      DIRECTION_ENGINE_ENABLED: ${DIRECTION_ENGINE_ENABLED:-true}
      DIRECTION_DEPTH_LIMIT: ${DIRECTION_DEPTH_LIMIT:-50}
      DIRECTION_AGG_TRADE_LIMIT: ${DIRECTION_AGG_TRADE_LIMIT:-500}
      DIRECTION_MIN_FORMAL_EDGE: ${DIRECTION_MIN_FORMAL_EDGE:-35}
      DIRECTION_CONTRADICTION_EDGE: ${DIRECTION_CONTRADICTION_EDGE:-25}
      FEISHU_ENABLED: ${FEISHU_ENABLED:-true}
      # Use webhook for custom bots, or app for a self-built Feishu application.
      FEISHU_MESSAGE_MODE: ${FEISHU_MESSAGE_MODE:-webhook}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL}
      FEISHU_SECRET: ${FEISHU_SECRET:-}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_RECEIVE_ID_TYPE: ${FEISHU_RECEIVE_ID_TYPE:-chat_id}
      FEISHU_RECEIVE_ID: ${FEISHU_RECEIVE_ID:-}
      FEISHU_API_BASE_URL: ${FEISHU_API_BASE_URL:-https://open.feishu.cn/open-apis}
      FEISHU_MARKET_SIGNAL_LEVELS: ${FEISHU_MARKET_SIGNAL_LEVELS:-formal}
      FEISHU_LIFECYCLE_EVENTS: ${FEISHU_LIFECYCLE_EVENTS:-open_signal,entry,close}
      FEISHU_HIGH_PRECISION_ONLY: ${FEISHU_HIGH_PRECISION_ONLY:-true}
      FEISHU_HIGH_PRECISION_SCORE: ${FEISHU_HIGH_PRECISION_SCORE:-84}
      FEISHU_HIGH_PRECISION_VOLUME_RATIO: ${FEISHU_HIGH_PRECISION_VOLUME_RATIO:-1.5}
      FEISHU_HIGH_PRECISION_VOLUME_SCORE: ${FEISHU_HIGH_PRECISION_VOLUME_SCORE:-74}
      FEISHU_NOTIFY_COOLDOWN_MINUTES: ${FEISHU_NOTIFY_COOLDOWN_MINUTES:-60}
    volumes:
      - ./data:/app/data
